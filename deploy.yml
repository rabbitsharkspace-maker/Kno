name: Deploy to GitHub Pages

on:
  push:
    branches: "main" # 确认你的主分支是 main 还是 master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build
        # 💡 如果 Kno 接入了 Gemini API 或 Supabase，记得取消下面三行的注释并在 GitHub Settings 里配置 Secrets
        # env:
        #   VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # Vite 项目默认打包目录

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
